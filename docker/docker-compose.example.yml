version: '3'

services:
  mysql:
    image: mysql:8.0
    container_name: elabftw-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: elabftw
      MYSQL_USER: elabftw
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - elabftw-net

  elabftw:
    image: elabftw/elabimg:latest
    container_name: elabftw-app
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - '3148:443'
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: elabftw
      DB_USER: elabftw
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SECRET_KEY: ${ELABFTW_SECRET_KEY}
      SERVER_NAME: ${SERVER_NAME:-localhost}
      DISABLE_HTTPS: 'false'
      ENABLE_LETSENCRYPT: 'false'
      MAX_UPLOAD_SIZE: 500m
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - elabftw-data:/elabftw/uploads
    networks:
      - elabftw-net

volumes:
  mysql-data:
  elabftw-data:

networks:
  elabftw-net:
